name: Deploy to S3 + CloudFront

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --configuration production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::366112400171:role/hoc-frontend-deployer-role
          aws-region: eu-central-1

      - name: Sync to S3
        run: |
          aws s3 sync dist/house-of-chaos-web/browser/ \
            s3://house-of-chaos-frontend-366112400171-eu-central-1-an \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E37KV6I5KZZLWS \
            --paths "/*"
